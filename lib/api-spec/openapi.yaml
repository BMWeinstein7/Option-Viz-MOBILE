openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: OptionViz API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: market
    description: Market data operations
  - name: strategies
    description: Strategy management
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /market/quote/{ticker}:
    get:
      operationId: getStockQuote
      tags: [market]
      summary: Get stock quote
      description: Returns live stock price and basic info
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"
        "404":
          description: Ticker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /market/expirations/{ticker}:
    get:
      operationId: getOptionExpirations
      tags: [market]
      summary: Get available option expiration dates
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of expiration dates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpirationsResponse"
        "404":
          description: Ticker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /market/chain/{ticker}/{expiration}:
    get:
      operationId: getOptionsChain
      tags: [market]
      summary: Get options chain for a ticker and expiration
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
        - name: expiration
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Options chain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OptionsChain"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /strategy/analyze:
    post:
      operationId: analyzeStrategy
      tags: [strategies]
      summary: Analyze a multi-leg options strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeStrategyRequest"
      responses:
        "200":
          description: Strategy analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StrategyAnalysis"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
    StockQuote:
      type: object
      properties:
        ticker:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        volume:
          type: integer
        high:
          type: number
        low:
          type: number
        open:
          type: number
        previousClose:
          type: number
        name:
          type: string
      required:
        - ticker
        - price
        - change
        - changePercent
        - volume
        - high
        - low
        - open
        - previousClose
        - name
    ExpirationsResponse:
      type: object
      properties:
        ticker:
          type: string
        expirations:
          type: array
          items:
            type: string
      required:
        - ticker
        - expirations
    OptionContract:
      type: object
      properties:
        strike:
          type: number
        lastPrice:
          type: number
        bid:
          type: number
        ask:
          type: number
        volume:
          type: integer
        openInterest:
          type: integer
        impliedVolatility:
          type: number
        delta:
          type: number
        gamma:
          type: number
        theta:
          type: number
        vega:
          type: number
      required:
        - strike
        - lastPrice
        - bid
        - ask
        - volume
        - openInterest
        - impliedVolatility
    OptionsChain:
      type: object
      properties:
        ticker:
          type: string
        expiration:
          type: string
        spotPrice:
          type: number
        calls:
          type: array
          items:
            $ref: "#/components/schemas/OptionContract"
        puts:
          type: array
          items:
            $ref: "#/components/schemas/OptionContract"
      required:
        - ticker
        - expiration
        - spotPrice
        - calls
        - puts
    StrategyLeg:
      type: object
      properties:
        action:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [call, put]
        strike:
          type: number
        premium:
          type: number
        quantity:
          type: integer
        expiration:
          type: string
      required:
        - action
        - type
        - strike
        - premium
        - quantity
        - expiration
    AnalyzeStrategyRequest:
      type: object
      properties:
        ticker:
          type: string
        spotPrice:
          type: number
        riskFreeRate:
          type: number
        legs:
          type: array
          items:
            $ref: "#/components/schemas/StrategyLeg"
      required:
        - ticker
        - spotPrice
        - legs
    PnLPoint:
      type: object
      properties:
        price:
          type: number
        pnl:
          type: number
      required:
        - price
        - pnl
    Greeks:
      type: object
      properties:
        delta:
          type: number
        gamma:
          type: number
        theta:
          type: number
        vega:
          type: number
        rho:
          type: number
      required:
        - delta
        - gamma
        - theta
        - vega
        - rho
    StrategyAnalysis:
      type: object
      properties:
        pnlAtExpiry:
          type: array
          items:
            $ref: "#/components/schemas/PnLPoint"
        greeks:
          $ref: "#/components/schemas/Greeks"
        maxProfit:
          type: number
          nullable: true
        maxLoss:
          type: number
          nullable: true
        breakEvenPoints:
          type: array
          items:
            type: number
        netCost:
          type: number
        riskRewardRatio:
          type: number
          nullable: true
      required:
        - pnlAtExpiry
        - greeks
        - breakEvenPoints
        - netCost
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
